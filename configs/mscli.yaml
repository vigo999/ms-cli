model:
  default_provider: openai
  default_model: gpt-4o-mini
providers:
  openai:
    base_url: https://api.openai.com/v1
    api_key_env: OPENAI_API_KEY
  openrouter:
    endpoint: https://openrouter.ai/api/v1
    api_key_env: OPENROUTER_API_KEY
budget:
  max_tokens_m: 1
  max_cost_usd: 10
ui:
  enabled: true
permissions:
  skip_requests: false
  allowed_tools: []
  require_approval_block: true
context:
  max_tokens: 0
  model_window_tokens: 163000
  budget_margin_tokens: 4096
  model_windows: {}
  compaction_threshold: 0.85
memory:
  max_items: 200
  max_bytes: 2097152
  ttl_hours: 168
engine:
  max_steps: 0
  shell_timeout_sec: 120
  max_output_lines: 200
  max_wall_time_sec: 1800
  max_repeated_shell: 2
session:
  persist_api_keys: false
trace:
  enabled: true
  path: .cache/mscli/trace.jsonl
