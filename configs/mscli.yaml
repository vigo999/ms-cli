model:
  # Protocol: openai | anthropic
  # Environment variable (highest priority): MSCLI_PROTOCOL
  protocol: openai
  # OpenAI-compatible API base URL
  # Environment variables (highest priority): MSCLI_BASE_URL
  # Fallback by protocol:
  #   openai -> OPENAI_BASE_URL
  #   anthropic -> ANTHROPIC_BASE_URL
  url: https://api.openai.com/v1
  # Model name
  # Environment variables (highest priority): MSCLI_MODEL
  # Fallback by protocol:
  #   openai -> OPENAI_MODEL
  #   anthropic -> ANTHROPIC_MODEL
  model: gpt-4o-mini
  # API key (recommended to use env: MSCLI_API_KEY / OPENAI_API_KEY / ANTHROPIC_API_KEY)
  key: ""
budget:
  max_tokens: 32768
  max_cost_usd: 10
ui:
  enabled: true
permissions:
  skip_requests: false
  allowed_tools: []
context:
  max_tokens: 24000
  compaction_threshold: 0.85
memory:
  max_items: 200
  max_bytes: 2097152
  ttl_hours: 168
